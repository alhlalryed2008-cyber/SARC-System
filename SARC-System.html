<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الهلال الأحمر - شعبة جرابلس</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --sarc-red: #d32f2f; --dark: #1a1a1a; --gray: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, button { width: 90%; padding: 12px; margin: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        button { background: var(--sarc-red); color: white; font-weight: bold; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--dark); color: white; }
        .no-print { display: block; }
        @media print { .no-print { display: none; } .print-area { display: block !important; } }
        .print-area { display: none; }
    </style>
</head>
<body>

    <div class="container no-print">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Red_Crescent_logo.svg/1200px-Red_Crescent_logo.svg.png" width="80">
        <h2>منظومة شعبة جرابلس - الهلال الأحمر</h2>

        <div id="reception">
            <h3>تسجيل مريض جديد</h3>
            <input type="text" id="pName" placeholder="اسم المريض الثلاثي">
            <select id="pDoc">
                <option value="د. فيصل البكار">د. فيصل البكار</option>
                <option value="د. دهوم الأمين">د. دهوم الأمين</option>
                <option value="عيادة الأسنان">عيادة الأسنان</option>
            </select>
            <button onclick="sendToDoctor()">إرسال للطبيب وطباعة 🖨️</button>
        </div>

        <hr>

        <div id="doctorView">
            <h3>قائمة الانتظار (تحديث تلقائي)</h3>
            <div id="patientList">انتظار وصول مرضى...</div>
        </div>
    </div>

    <div id="ticket" class="print-area">
        <h2>الهلال الأحمر - جرابلس</h2>
        <p id="tName" style="font-size: 24px; font-weight: bold;"></p>
        <p id="tDoc"></p>
        <svg id="barcode"></svg>
    </div>

<script>
    // إعداد "الجسر" بين الهاتف والكمبيوتر
    // ملاحظة لأحمد: هذا الرابط تجريبي، سيعمل فوراً بمجرد رفعه
    const firebaseConfig = { databaseURL: "https://sarc-jarabulus-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. وظيفة الهاتف (إرسال)
    function sendToDoctor() {
        const name = document.getElementById('pName').value;
        const doc = document.getElementById('pDoc').value;
        if(!name) return alert("يرجى كتابة الاسم");

        const patientData = { name, doc, time: new Date().toLocaleTimeString() };
        
        // رفع البيانات للسحابة
        db.ref('today_patients').push(patientData).then(() => {
            document.getElementById('tName').innerText = name;
            document.getElementById('tDoc').innerText = doc;
            JsBarcode("#barcode", "SARC-" + Math.floor(Math.random()*1000), {height: 40});
            window.print(); // طباعة التذكرة
            alert("تم الإرسال للطبيب بنجاح ✅");
        });
    }

    // 2. وظيفة الكمبيوتر (استلام تلقائي)
    db.ref('today_patients').on('value', (snapshot) => {
        const data = snapshot.val();
        let html = `<table><tr><th>الاسم</th><th>العيادة</th><th>الوقت</th></tr>`;
        for(let id in data) {
            html += `<tr>
                <td>${data[id].name}</td>
                <td>${data[id].doc}</td>
                <td>${data[id].time}</td>
            </tr>`;
        }
        document.getElementById('patientList').innerHTML = html + "</table>";
    });
</script>

</body>
</html>
